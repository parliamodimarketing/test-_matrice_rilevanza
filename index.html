<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dove sei sulla mappa? | Parliamo di Marketing</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Plus Jakarta Sans",sans-serif;background:#FAFAF7;color:#1a1a1a}
button{cursor:pointer;font-family:inherit}
#p-intro,#p-test,#p-res{min-height:100vh;padding:40px 20px}
.wrap{max-width:500px;margin:0 auto}
.btn{padding:14px 40px;border-radius:8px;border:none;font-size:13px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;background:#D4922A;color:#fff;box-shadow:0 2px 8px rgba(212,146,42,.25)}
.btn:disabled{background:#E8E5DF;color:#bbb;box-shadow:none}
.card{background:#fff;border-radius:12px;padding:22px;border:1px solid #E8E5DF;margin-bottom:10px}
.card.done{border-color:#ccc;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.qbtn{flex:1;padding:11px 0;border-radius:8px;border:1px solid #E8E5DF;background:#FAFAF7;color:#888;font-size:14px;font-weight:500}
.qbtn.si{border:2px solid #D4922A;background:#FBF3E6;color:#A06D10;font-weight:700}
.qbtn.no{border:2px solid #999;background:#F5F5F3;color:#1a1a1a;font-weight:700}
.bar{width:100%;height:3px;background:#E8E5DF;border-radius:3px;overflow:hidden;margin-bottom:28px}
.fill{height:100%;background:#D4922A;border-radius:3px;transition:width .4s}
@keyframes pp{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
</style>
</head>
<body>

<div id="p-intro" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
  <div style="max-width:420px">
    <div style="font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#D4922A;margin-bottom:28px">Il marketing della rilevanza</div>
    <h1 style="font-size:34px;font-weight:800;line-height:1.2;margin-bottom:14px">Dove sei sulla mappa?</h1>
    <p style="font-size:15px;color:#555;margin-bottom:8px">Otto domande. Due assi. Quattro posizioni.</p>
    <p style="font-size:13px;color:#888;margin-bottom:32px">Rispondi si solo quando il si e pieno.</p>
    <button class="btn" onclick="inizia()">Inizia il test</button>
  </div>
</div>

<div id="p-test" style="display:none">
  <div class="wrap">
    <div style="text-align:center;margin-bottom:24px">
      <h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Dove sei sulla mappa?</h2>
      <p id="cnt" style="font-size:12px;color:#888;margin-bottom:12px">0 di 8</p>
      <div class="bar"><div class="fill" id="bf" style="width:0"></div></div>
    </div>
    <div style="font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#D4922A;margin-bottom:14px">Asse 1 - La sostanza</div>
    <div id="box1"></div>
    <div style="height:22px"></div>
    <div style="font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#D4922A;margin-bottom:14px">Asse 2 - Il riconoscimento</div>
    <div id="box2"></div>
    <div style="text-align:center;padding:20px 0">
      <button class="btn" id="bSub" disabled onclick="risultati()">0/8 domande</button>
    </div>
  </div>
</div>

<div id="p-res" style="display:none">
  <div class="wrap" id="resBox"></div>
</div>

<script>
var ans = {};

var domande = [
  {id:1, n:"1. Problema sentito", q:"Il tuo brand risolve un problema che il cliente sente davvero importante?", h:"Non convenienza o abitudine. Un problema reale, sentito, concreto.", ax:"pot"},
  {id:2, n:"2. Difficile da sostituire", q:"Quello che offri sarebbe difficile da sostituire per i clienti abituali?", h:"Perderebbero qualcosa di specifico, o troverebbero un sostituto in pochi giorni?", ax:"pot"},
  {id:3, n:"3. Qualita unica", q:"Hai una qualita o una capacita che pochi altri nel mercato hanno davvero?", h:"Togli comunicazione, tono, sito, packaging. Resta qualcosa di non replicabile?", ax:"pot"},
  {id:4, n:"4. Test della scomparsa", q:"Se il tuo brand smettesse di esistere domani, i clienti se ne accorgerebbero?", h:"Si creerebbe un vuoto, o passerebbero a un altro senza commentare?", ax:"pot"},
  {id:5, n:"5. Nominato spontaneamente", q:"Il tuo brand viene nominato spontaneamente quando si parla della tua categoria?", h:"Succede che qualcuno lo citi da solo, senza che tu lo presenti?", ax:"per"},
  {id:6, n:"6. Presente alla scelta", q:"Quando un cliente sta per comprare nella tua categoria, il tuo brand e presente?", h:"Scaffale, ricerca, marketplace, consiglio, comparatore: ci sei?", ax:"per"},
  {id:7, n:"7. Segnale chiaro", q:"Se qualcuno dovesse descrivere il tuo brand a un collega, saprebbe farlo in modo chiaro?", h:"Ricevi un riconoscimento preciso, o una formula vaga e intercambiabile?", ax:"per"},
  {id:8, n:"8. Scelta naturale", q:"I clienti ti scelgono al momento giusto, o devi inseguirli a lungo prima che comprino?", h:"Quando incontra la persona giusta, qualcosa scatta facilmente?", ax:"per"}
];

var quadranti = {
  invisibile: {nome:"Invisibile", cod:"Q1", desc:"Ne sostanza distintiva ne presenza nella mente del cliente", col:"#999", sfondo:"#F5F5F3",
    prob:"Il problema non e la comunicazione. E la mancanza di una ragione forte per essere scelti.",
    az:[["Costruisci prima, parla dopo","Quale problema risolvi, per chi, meglio di chi. Solo quando questa risposta regge ha senso amplificarla."],["Testa nel reale","Verifica se il brand inizia a essere notato e ricordato. Senza questo segnale, comunicare amplifica solo il vuoto."],["Aspetta i tre si","Solo quando le prime quattro domande restituiscono almeno tre si, ha senso alzare la voce."]],
    avviso:"Amplificare un brand senza sostanza significa rendere piu visibile un vuoto.",
    esempio:"Nokia nella fase finale - da Q4 a Q1"},
  promessa: {nome:"Promessa fragile", cod:"Q2", desc:"La percezione e corsa avanti. La sostanza non c'e ancora.", col:"#C75D3A", sfondo:"#FDF5F2",
    prob:"Il mercato ha creduto a una promessa che il brand non e ancora in grado di mantenere.",
    az:[["Alza la sostanza","Migliorare prodotto, servizio, delivery, customer experience. Porta la realta alla altezza della narrazione."],["Oppure abbassa la promessa","Comunicare in modo piu sobrio. Nel breve sembra perdita di ambizione. Nel lungo, protegge il brand."],["Mai gonfiare la promessa","Continuare a comunicare come se nulla fosse, sperando che la sostanza arrivi da sola, e il modo piu veloce per consumare fiducia. Non arriva."]],
    avviso:"Ogni giorno in cui la promessa resta piu alta della realta rende il gap piu visibile.",
    esempio:"Allbirds, WeWork - da Q4 a Q2"},
  sottovalutato: {nome:"Sottovalutato", cod:"Q3", desc:"La sostanza c'e. Il mercato non la vede ancora.", col:"#2E7DAF", sfondo:"#F2F7FB",
    prob:"Il brand ha sostanza, ma non entra con sufficiente forza nei momenti di scelta.",
    az:[["Presidia dove si decide","Scaffale, ricerca, consiglio professionale, social, comparatori. Non ovunque: nei punti che contano."],["Semplifica il segnale","Se ogni cliente descrive il brand in modo diverso, il valore esiste ma non e abbastanza chiaro."],["Costruisci continuita","Essere sempre un po visibili, nei luoghi giusti, e piu utile che essere molto visibili una volta ogni tanto."]],
    avviso:"Non serve inventarsi un altro brand. Serve far vedere meglio quello che il brand e gia.",
    esempio:"Decathlon - da Q3 a Q4"},
  rilevante: {nome:"Brand rilevante", cod:"Q4", desc:"La sostanza c'e. Il mercato la riconosce.", col:"#B8861B", sfondo:"#FBF7EF",
    prob:"Il problema non e arrivare. E restare.",
    az:[["Monitora promessa ed esperienza","La rilevanza si erode lentamente: cambia il contesto, si standardizza la esperienza, si allenta la coerenza."],["Difendi il lungo periodo","Continuare a investire nel brand mentre si sostiene la performance. E il solo modo per mantenere la posizione."],["Rinnova senza tradire","Aggiornare i segnali senza rompere la continuita. Rinnovare senza perdere cio che rende il brand riconoscibile."]],
    avviso:"Anche un brand rilevante puo smettere di esserlo, se conta su cio che lo rendeva tale ieri.",
    esempio:"Patagonia - permanenza in Q4"}
};

function inizia(){
  document.getElementById("p-intro").style.display = "none";
  document.getElementById("p-test").style.display = "block";
  disegna();
}

function rispondi(id, val){
  ans[id] = val;
  disegna();
  aggiorna();
}

function disegna(){
  var b1 = document.getElementById("box1");
  var b2 = document.getElementById("box2");
  b1.innerHTML = "";
  b2.innerHTML = "";
  for(var i = 0; i < domande.length; i++){
    var d = domande[i];
    var html = '<div class="card' + (ans[d.id] !== undefined ? ' done' : '') + '">';
    html += '<div style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:10px">' + d.n + '</div>';
    html += '<p style="font-size:16px;font-weight:600;line-height:1.55;margin-bottom:6px">' + d.q + '</p>';
    html += '<p style="font-size:13px;color:#888;line-height:1.5;margin-bottom:18px">' + d.h + '</p>';
    html += '<div style="display:flex;gap:10px">';
    html += '<button class="qbtn' + (ans[d.id] === 1 ? ' si' : '') + '" onclick="rispondi(' + d.id + ',1)">Si</button>';
    html += '<button class="qbtn' + (ans[d.id] === 0 ? ' no' : '') + '" onclick="rispondi(' + d.id + ',0)">No</button>';
    html += '</div></div>';
    if(d.ax === "pot") b1.innerHTML += html;
    else b2.innerHTML += html;
  }
}

function aggiorna(){
  var n = Object.keys(ans).length;
  document.getElementById("cnt").textContent = n + " di 8";
  document.getElementById("bf").style.width = (n / 8 * 100) + "%";
  var b = document.getElementById("bSub");
  if(n === 8){ b.disabled = false; b.textContent = "Scopri il tuo quadrante"; }
  else { b.disabled = true; b.textContent = n + "/8 domande"; }
}

function trovaQ(p, r){
  if(p >= 3 && r >= 3) return "rilevante";
  if(p < 3 && r >= 3) return "promessa";
  if(p >= 3 && r < 3) return "sottovalutato";
  return "invisibile";
}

function risultati(){
  if(Object.keys(ans).length < 8) return;
  var ps = 0, rs = 0;
  for(var i = 0; i < domande.length; i++){
    var d = domande[i];
    if(d.ax === "pot") ps += (ans[d.id] || 0);
    else rs += (ans[d.id] || 0);
  }
  var qk = trovaQ(ps, rs);
  var q = quadranti[qk];
  var xP = 12 + (ps / 4) * 76;
  var yP = 88 - (rs / 4) * 76;

  var h = '';

  // Header
  h += '<div style="text-align:center;margin-bottom:32px">';
  h += '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:8px">' + q.cod + '</div>';
  h += '<div style="font-size:32px;font-weight:800;color:' + q.col + ';margin-bottom:6px">' + q.nome + '</div>';
  h += '<p style="font-size:14px;color:#555;font-weight:500">' + q.desc + '</p>';
  h += '</div>';

  // Matrix
  h += '<div style="position:relative;width:100%;max-width:380px;margin:0 auto 24px">';
  h += '<div style="position:relative;width:100%;padding-bottom:100%;border-radius:14px;border:1px solid #E8E5DF;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.04)">';
  h += '<div style="position:absolute;left:0;top:0;width:50%;height:50%;background:#FDF5F2"></div>';
  h += '<div style="position:absolute;right:0;top:0;width:50%;height:50%;background:#FBF7EF"></div>';
  h += '<div style="position:absolute;left:0;bottom:0;width:50%;height:50%;background:#F7F7F5"></div>';
  h += '<div style="position:absolute;right:0;bottom:0;width:50%;height:50%;background:#F2F7FB"></div>';
  h += '<div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:#ddd"></div>';
  h += '<div style="position:absolute;top:50%;left:0;right:0;height:1px;background:#ddd"></div>';
  h += '<div style="position:absolute;left:25%;top:75%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:#bbb;text-align:center;letter-spacing:1px;text-transform:uppercase;line-height:1.5">Q1<br>Invisibile</div>';
  h += '<div style="position:absolute;left:75%;top:75%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:#7AABCC;text-align:center;letter-spacing:1px;text-transform:uppercase;line-height:1.5">Q3<br>Sottovalutato</div>';
  h += '<div style="position:absolute;left:25%;top:25%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:#D4845A;text-align:center;letter-spacing:1px;text-transform:uppercase;line-height:1.5">Q2<br>Promessa<br>fragile</div>';
  h += '<div style="position:absolute;left:75%;top:25%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:#C9A050;text-align:center;letter-spacing:1px;text-transform:uppercase;line-height:1.5">Q4<br>Brand<br>rilevante</div>';
  h += '<div style="position:absolute;left:' + xP + '%;top:' + yP + '%;transform:translate(-50%,-50%);z-index:10">';
  h += '<div style="width:38px;height:38px;border-radius:50%;background:' + q.col + ';box-shadow:0 2px 12px ' + q.col + '55;display:flex;align-items:center;justify-content:center;animation:pp 2.5s ease-in-out infinite">';
  h += '<span style="font-size:10px;font-weight:800;color:#fff;letter-spacing:1px">TU</span></div></div>';
  h += '<div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:9px;color:#bbb;font-weight:700;letter-spacing:2px;text-transform:uppercase">Potenziale &rarr;</div>';
  h += '<div style="position:absolute;left:8px;top:50%;transform:translateY(-50%) rotate(-90deg);transform-origin:center;font-size:9px;color:#bbb;font-weight:700;letter-spacing:2px;text-transform:uppercase">Percepita &rarr;</div>';
  h += '</div></div>';

  // Scores
  h += '<div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px">';
  h += '<div style="flex:1;max-width:150px;background:#fff;border-radius:10px;padding:16px 12px;text-align:center;border:1px solid #E8E5DF"><div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:4px">Potenziale</div><div style="font-size:30px;font-weight:800">' + ps + '</div><div style="font-size:11px;color:#888">su 4 - soglia 3</div></div>';
  h += '<div style="flex:1;max-width:150px;background:#fff;border-radius:10px;padding:16px 12px;text-align:center;border:1px solid #E8E5DF"><div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:4px">Percepita</div><div style="font-size:30px;font-weight:800">' + rs + '</div><div style="font-size:11px;color:#888">su 4 - soglia 3</div></div>';
  h += '</div>';

  // 2-2
  if(ps === 2 && rs === 2){
    h += '<div style="background:#FBF3E6;border:1px solid #EDD9A8;border-radius:10px;padding:18px;margin-bottom:20px;text-align:center">';
    h += '<div style="font-size:14px;font-weight:700;color:#A06D10;margin-bottom:6px">Il caso 2-2</div>';
    h += '<div style="font-size:13px;color:#555;line-height:1.6">Sembra equilibrio, ma non lo e. La domanda strategica: da dove cominciare?</div></div>';
  }

  // Problem
  h += '<div style="background:' + q.sfondo + ';border-radius:12px;padding:22px 20px;margin-bottom:14px;border-left:3px solid ' + q.col + '">';
  h += '<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:8px">Il problema</div>';
  h += '<p style="font-size:16px;font-weight:600;line-height:1.5">' + q.prob + '</p></div>';

  // Warning
  h += '<div style="background:#F5F4F1;border-radius:10px;padding:14px 16px;margin-bottom:22px;border:1px solid #E8E5DF;font-size:12px;color:#555;line-height:1.5">' + q.avviso + '</div>';

  // Actions
  h += '<div style="font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:14px">Cosa fare</div>';
  for(var j = 0; j < q.az.length; j++){
    h += '<div style="margin-bottom:14px;padding-left:16px;border-left:2px solid ' + q.col + '44">';
    h += '<h4 style="font-size:14px;font-weight:700;color:' + q.col + ';margin-bottom:3px">' + q.az[j][0] + '</h4>';
    h += '<p style="font-size:13px;color:#555;font-weight:500;line-height:1.6">' + q.az[j][1] + '</p></div>';
  }

  // Example
  h += '<div style="background:#F5F4F1;border-radius:10px;padding:14px 16px;margin:18px 0;border:1px solid #E8E5DF">';
  h += '<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#bbb;margin-bottom:4px">Nel libro - stessa traiettoria</div>';
  h += '<span style="font-size:13px;color:#555;font-weight:500">' + q.esempio + '</span></div>';

  // CTA
  h += '<div style="text-align:center;margin:32px 0 20px;padding:24px 20px;background:#FBF7EF;border-radius:12px;border:1px solid #EDD9A8">';
  h += '<p style="font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.4">La matrice e una mappa.</p>';
  h += '<p style="font-size:15px;font-weight:700;color:#D4922A;margin-bottom:16px;line-height:1.4">La strategia e la direzione che scegli di prendere.</p>';
  h += '<p style="font-size:12px;color:#888;margin-bottom:14px">Perche essere bravi non basta - Il marketing della rilevanza</p>';
  h += '<button style="padding:10px 24px;border-radius:8px;border:1px solid #D4922A;background:none;color:#D4922A;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer" onclick="ricomincia()">Rifai il test</button>';
  h += '</div>';

  h += '<p style="font-size:11px;color:#bbb;text-align:center;margin:8px 0 32px">Il quadrante in cui ti trovi oggi non e una sentenza. E una posizione.</p>';

  document.getElementById("resBox").innerHTML = h;
  document.getElementById("p-test").style.display = "none";
  document.getElementById("p-res").style.display = "block";
  window.scrollTo(0, 0);
}

function ricomincia(){
  ans = {};
  document.getElementById("p-res").style.display = "none";
  document.getElementById("p-intro").style.display = "flex";
}
</script>
</body>
</html>
